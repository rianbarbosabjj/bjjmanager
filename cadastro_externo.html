<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrícula Digital | BJJ Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden text-slate-800 bg-[#F8FAFC]">

    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full bg-slate-900 p-3 text-center relative z-50 shrink-0 shadow-md flex items-center justify-center h-14">
        <a href="https://manager.bjjdigital.com.br" target="_blank" class="absolute left-4 top-1.5 transition-opacity hover:opacity-80">
            <img src="logo_bjj_manager.png" alt="BJJ Systems" class="h-10 w-auto object-contain">
        </a>
        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest hidden sm:inline-block">Autoatendimento</span>
    </div>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-10 hide-scrollbar">
        <div class="max-w-3xl mx-auto" id="container-principal">
            
            <div class="flex justify-center mb-8 mt-4">
                <div class="bg-slate-900/80 backdrop-blur-md p-4 md:p-6 rounded-[2rem] shadow-xl border border-slate-700/50">
                    <img id="logo-equipe" src="" alt="Logo" class="h-20 md:h-28 w-auto object-contain hidden">
                    <div id="fallback-logo" class="w-20 h-20 rounded-full bg-slate-800 border-2 border-slate-600 text-white flex items-center justify-center text-4xl font-black hidden shadow-inner"></div>
                </div>
            </div>

            <div class="mb-8 text-center" id="cabecalho-form">
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Carregando formulário...</h2>
                <div class="flex justify-center mt-4">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500"></div>
                </div>
            </div>

            <!-- Formulário Aluno -->
            <div id="form-aluno" class="space-y-6 hidden">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                    <h3 class="font-black text-slate-800 mb-6">Dados Pessoais</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-600 mb-1">Nome Completo *</label>
                            <input type="text" id="cad-nome" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">CPF *</label>
                            <input type="text" id="cad-cpf" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Data Nascimento *</label>
                            <input type="date" id="cad-nasc" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">WhatsApp *</label>
                            <input type="text" id="cad-tel" class="w-full p-3 border rounded-xl">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-600 mb-1">E-mail *</label>
                            <input type="email" id="cad-email" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Senha *</label>
                            <input type="password" id="cad-senha" class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Confirmar Senha *</label>
                            <input type="password" id="cad-senha-confirma" class="w-full p-3 border rounded-xl">
                        </div>
                    </div>
                </div>

                <div class="pt-6 pb-8">
                    <button onclick="alert('Teste funcionando!')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl">
                        FINALIZAR MATRÍCULA (TESTE)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        console.log("🚀 Script iniciado!");

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:61186696fe097be870759c"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        console.log("✅ Firebase inicializado!");

        const paramsUrl = new URLSearchParams(window.location.search);
        const tipoAcesso = paramsUrl.get('tipo') || 'aluno';
        const equipeId = paramsUrl.get('equipe');

        console.log("📋 Parâmetros:", { tipoAcesso, equipeId });

        async function inicializarCadastro() {
            console.log("🔍 Inicializando cadastro...");
            
            if(!equipeId) {
                console.error("❌ equipeId não encontrado na URL!");
                document.getElementById('cabecalho-form').innerHTML = `
                    <h2 class="text-rose-500 font-black text-2xl">Link Inválido</h2>
                    <p class="text-slate-500 mt-2">Faltando parâmetro 'equipe' na URL.</p>
                    <p class="text-xs text-slate-400 mt-4">Exemplo: ?equipe=ID_AQUI&tipo=aluno</p>
                `;
                return;
            }

            try {
                console.log("📡 Buscando equipe no Firestore:", equipeId);
                
                // Teste simples de conexão
                const testRef = doc(db, "equipes", equipeId);
                const docSnap = await getDoc(testRef);
                
                console.log("📄 Documento existe?", docSnap.exists());
                
                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    console.log("🏢 Nome da equipe:", dados.nome_equipe);
                    
                    document.getElementById('cabecalho-form').innerHTML = `
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Ficha de Matrícula</h2>
                        <p class="text-sm text-slate-500 mt-1">Equipe: <b>${dados.nome_equipe || 'Carregando...'}</b></p>
                    `;
                    
                    // Mostrar formulário
                    document.getElementById('form-aluno').classList.remove('hidden');
                    
                } else {
                    throw new Error("Equipe não encontrada no banco de dados");
                }
                
            } catch (error) {
                console.error("❌ ERRO:", error);
                console.error("Código:", error.code);
                console.error("Mensagem:", error.message);
                
                document.getElementById('cabecalho-form').innerHTML = `
                    <div class="bg-rose-50 border border-rose-200 rounded-2xl p-6">
                        <h2 class="text-rose-500 font-black text-xl">Erro de Conexão</h2>
                        <p class="text-slate-600 mt-2">${error.message || 'Falha ao carregar dados'}</p>
                        <p class="text-xs text-slate-500 mt-4">Código: ${error.code || 'desconhecido'}</p>
                        <button onclick="location.reload()" class="mt-4 bg-rose-500 text-white px-4 py-2 rounded-lg">
                            Tentar novamente
                        </button>
                    </div>
                `;
            }
        }

        // Executar
        inicializarCadastro();
        
        console.log("🏁 Script finalizado, aguardando respostas...");
    </script>
</body>
</html>
